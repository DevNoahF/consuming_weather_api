spring:
  application:
    name: WeatherApiConsuming
    ApiKey: ${API_KEY}
    cors:
      allowed-origins: "https://weather-frontend-qxwf.onrender.com"
  cache:
    type: redis
    redis:
      time-to-live: 1h
    data:
      redis:
        url: ${REDIS_URL}
        client-name: cache
server:
  ssl:
    enabled: true
